services:
  postgres:
    image: ${DOCKERHUB_USERNAME:-jeremiah-vanofferen}/weddingsite-postgres:${APP_IMAGE_TAG:-latest}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wedding_db}
      POSTGRES_USER: ${POSTGRES_USER:-wedding_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-your@email.com}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password123}
      WEBSITE_NAME: ${WEBSITE_NAME:-My Wedding}
      REGISTRY_LINK: ${REGISTRY_LINK:-https://www.amazon.com/wedding}
      WEDDING_DATE: ${WEDDING_DATE:-2030-06-20}
      WEDDING_TIME: ${WEDDING_TIME:-16:00}
      WEDDING_TIME_ZONE: ${WEDDING_TIME_ZONE:-America/New_York}
      WEDDING_LOCATION: ${WEDDING_LOCATION:-Celebration Venue}
      WEDDING_ADDRESS: ${WEDDING_ADDRESS:-123 Celebration Ave, Hometown, ST 12345}
      WEDDING_DESCRIPTION: ${WEDDING_DESCRIPTION:-Join us for our ceremony and reception.}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - backend_uploads:/uploads-target
    # No port binding — Postgres is only accessible within the Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wedding_user} -d ${POSTGRES_DB:-wedding_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ${DOCKERHUB_USERNAME:-jeremiah-vanofferen}/weddingsite-backend:${APP_IMAGE_TAG:-latest}
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      BIND_HOST: ${BIND_HOST:-0.0.0.0}
      DATABASE_URL: ${DATABASE_URL:-postgresql://wedding_user:changeme@postgres:5432/wedding_db}
      JWT_SECRET: ${JWT_SECRET:-changeme_replace_with_a_long_random_secret}
      GMAIL_USER: ${GMAIL_USER:-createWedding@gmail.com}
      GMAIL_PASS: ${GMAIL_PASS:-xxxx xxxx xxxx xxxx}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-your@email.com}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - backend_uploads:/app/uploads

  wedding-app:
    image: ${DOCKERHUB_USERNAME:-jeremiah-vanofferen}/weddingsite-frontend:${APP_IMAGE_TAG:-latest}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      VITE_BIND_HOST: ${VITE_BIND_HOST:-0.0.0.0}
      VITE_BIND_PORT: ${VITE_BIND_PORT:-3000}
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  backend_uploads:
