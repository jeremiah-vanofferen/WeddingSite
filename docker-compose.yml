services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wedding_db}
      POSTGRES_USER: ${POSTGRES_USER:-wedding_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password123}
      WEBSITE_NAME: ${WEBSITE_NAME:-My Wedding}
      REGISTRY_LINK: ${REGISTRY_LINK}
      WEDDING_DATE: ${WEDDING_DATE:-2030-06-20}
      WEDDING_TIME: ${WEDDING_TIME:-16:00}
      WEDDING_TIME_ZONE: ${WEDDING_TIME_ZONE:-America/New_York}
      WEDDING_LOCATION: ${WEDDING_LOCATION:-Celebration Venue}
      WEDDING_ADDRESS: ${WEDDING_ADDRESS:-123 Celebration Ave, Hometown, ST 12345}
      WEDDING_DESCRIPTION: ${WEDDING_DESCRIPTION:-Join us for our ceremony and reception.}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh
      - ./backend/uploads:/seed-uploads:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wedding_user} -d ${POSTGRES_DB:-wedding_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_PASS=${GMAIL_PASS}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./backend:/app
      - /app/node_modules

  wedding-app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      # No VITE_API_URL — the SPA uses /api (same-origin) and the Vite proxy
      # routes it to http://backend:5000, which works from any client.
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
