name: Deploy Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-verify:
    name: Verify Frontend
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm test

  backend-verify:
    name: Verify Backend
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint

      - name: Test backend
        run: npm test

      - name: Seed safeguard tests
        run: npm run test:seed

  deploy:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    needs:
      - frontend-verify
      - backend-verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          FRONTEND_IMAGE="docker.io/${USERNAME}/weddingsite-frontend"
          BACKEND_IMAGE="docker.io/${USERNAME}/weddingsite-backend"
          POSTGRES_IMAGE="docker.io/${USERNAME}/weddingsite-postgres"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${FRONTEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${BACKEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "postgres_image=${POSTGRES_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.frontend_image }}:latest
            ${{ steps.meta.outputs.frontend_image }}:sha-${{ github.sha }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.backend_image }}:latest
            ${{ steps.meta.outputs.backend_image }}:sha-${{ github.sha }}

      - name: Build and push postgres image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.postgres
          push: true
          tags: |
            ${{ steps.meta.outputs.postgres_image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.postgres_image }}:latest
            ${{ steps.meta.outputs.postgres_image }}:sha-${{ github.sha }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    needs:
      - deploy
    outputs:
      release_created: ${{ steps.release_state.outputs.release_created }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine release version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        shell: bash
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true

      - name: Set release state
        id: release_state
        shell: bash
        run: |
          if [ "${{ steps.check_tag.outputs.exists }}" = "false" ]; then
            echo "release_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_created=false" >> "$GITHUB_OUTPUT"
          fi
